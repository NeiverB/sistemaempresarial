<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Listado de Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2>Listado de Productos</h2>

</div>

<div class="card-body">

<div class="alert alert-success"
    th:if="${mensaje}"
    th:text="${mensaje}">
</div>

<a href="/productos/nuevo"
class="btn btn-success mb-3">
Nuevo Producto
</a>

<a href="/"
class="btn btn-secondary mb-3">
Inicio
</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Categoría</th>
<th>Precio</th>
<th>Fecha</th>
<th>Estado</th>
<th>Destacado</th>
<th>Descripción</th>
<th>Acciones</th>

</tr>

</thead>

<tbody>

<tr th:each="producto : ${productos}">

<td th:text="${producto.id}"></td>

<td th:text="${producto.nombre}"></td>

<td th:text="${producto.categoria.nombre}"></td>

<td th:text="${producto.precio}"></td>

<td th:text="${producto.fechaRegistro}"></td>

<td th:text="${producto.estado}"></td>

<td>
<span th:text="${producto.destacado ? 'Sí' : 'No'}"></span>
</td>

<td th:text="${producto.descripcion}"></td>

<td>

<a th:href="@{/productos/editar/{id}(id=${producto.id})}"
class="btn btn-warning btn-sm">
Editar
</a>

<a th:href="@{/productos/eliminar/{id}(id=${producto.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Está seguro de eliminar este producto?')">
Eliminar
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
