<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Editar Producto</h2>

    <form th:action="@{/productos/actualizar}"
        th:object="${producto}"
        method="post">

        <input type="hidden"
            th:field="*{id}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"
                class="form-control"
                th:field="*{nombre}"
                required>
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <input type="text"
                class="form-control"
                th:field="*{categoria}"
                required>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input type="number"
                step="0.01"
                class="form-control"
                th:field="*{precio}"
                required>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Actualizar
        </button>

        <a href="/productos"
        class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
